<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tier List</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f4f4f4;
}

.header {
  padding: 10px 20px;
  background: #222;
  color: white;
  display: flex;
  justify-content: space-between;
}

button { padding: 6px 12px; cursor: pointer; }

.main { padding: 15px; }

/* Tier rows */
.tier-row {
  display: flex;
  margin-bottom: 6px;
}

.tier-label {
  width: 80px;
  font-size: 26px;
  font-weight: bold;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
}

.tier-content {
  flex: 1;
  min-height: 70px;
  background: #e5e5e5;
  display: grid;
  grid-template-columns: repeat(auto-fill, 70px);
  gap: 6px;
  padding: 6px;
}

/* Colors */
.s { background: #2ecc71; }
.a { background: #3498db; }
.b { background: #9b59b6; }
.c { background: #e67e22; }
.d { background: #e74c3c; }

/* Images */
.img {
  width: 70px;
  height: 70px;
  border: 2px solid #ccc;
  cursor: grab;
  overflow: hidden;
}

.img.dragging { opacity: 0.5; }

.img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* Pool */
.pool {
  margin-top: 20px;
  padding: 10px;
  border: 2px dashed #aaa;
  background: #fff;
}

.pool-images {
  display: grid;
  grid-template-columns: repeat(auto-fill, 70px);
  gap: 6px;
  min-height: 60px;
}
</style>
</head>

<body>

<div class="header">
  <div>Tier List</div>
  <button id="export">Export</button>
</div>

<div class="main">

  <div class="tier-row"><div class="tier-label s">S</div><div class="tier-content"></div></div>
  <div class="tier-row"><div class="tier-label a">A</div><div class="tier-content"></div></div>
  <div class="tier-row"><div class="tier-label b">B</div><div class="tier-content"></div></div>
  <div class="tier-row"><div class="tier-label c">C</div><div class="tier-content"></div></div>
  <div class="tier-row"><div class="tier-label d">D</div><div class="tier-content"></div></div>

  <div class="pool">
    <p>Paste or drag images</p>
    <div class="pool-images" id="pool"></div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>
let dragged = null;

// Create image
function createImg(src) {
  const div = document.createElement("div");
  div.className = "img";
  div.draggable = true;

  const img = document.createElement("img");
  img.src = src;
  div.appendChild(img);

  div.addEventListener("dragstart", () => {
    dragged = div;
    div.classList.add("dragging");
  });

  div.addEventListener("dragend", () => {
    dragged = null;
    div.classList.remove("dragging");
  });

  return div;
}

// Get insert position (for reordering)
function getAfterElement(container, x, y) {
  const els = [...container.querySelectorAll(".img:not(.dragging)")];

  return els.reduce((closest, child) => {
    const box = child.getBoundingClientRect();
    const offset = x - box.left - box.width / 2;

    if (offset < 0 && offset > closest.offset) {
      return { offset: offset, element: child };
    } else {
      return closest;
    }
  }, { offset: Number.NEGATIVE_INFINITY }).element;
}

// Enable drop zones
function setupZone(zone) {
  zone.addEventListener("dragover", e => {
    e.preventDefault();

    const after = getAfterElement(zone, e.clientX, e.clientY);

    if (!after) {
      zone.appendChild(dragged);
    } else {
      zone.insertBefore(dragged, after);
    }
  });

  zone.addEventListener("drop", e => {
    e.preventDefault();
  });
}

// Apply to all zones
document.querySelectorAll(".tier-content, .pool-images")
  .forEach(setupZone);

// Paste images
document.addEventListener("paste", e => {
  for (let item of e.clipboardData.items) {
    if (item.type.startsWith("image")) {
      const reader = new FileReader();
      reader.onload = ev => {
        document.getElementById("pool")
          .appendChild(createImg(ev.target.result));
      };
      reader.readAsDataURL(item.getAsFile());
    }
  }
});

// Drag from desktop
document.addEventListener("dragover", e => e.preventDefault());

document.addEventListener("drop", e => {
  if (e.dataTransfer.files.length) {
    e.preventDefault();

    [...e.dataTransfer.files].forEach(file => {
      if (file.type.startsWith("image")) {
        const reader = new FileReader();
        reader.onload = ev => {
          document.getElementById("pool")
            .appendChild(createImg(ev.target.result));
        };
        reader.readAsDataURL(file);
      }
    });
  }
});

// Export
document.getElementById("export").onclick = async () => {
  const canvas = await html2canvas(document.querySelector(".main"));
  const link = document.createElement("a");
  link.download = "tierlist.png";
  link.href = canvas.toDataURL();
  link.click();
};
</script>

</body>
</html>
